name: unclarity CI

on:
  push:
    paths: ["unclarity-packages/**", "python/**", "schemas/**", ".github/workflows/unclarity-ci.yml"]
  pull_request:
    paths: ["unclarity-packages/**", "python/**", "schemas/**"]

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unclarity-packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npx vitest run session bundle device-profile realism run

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unclarity-packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npx --yes @biomejs/biome@1.9.4 check core/src capture/src

  capture-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unclarity-packages/capture
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
      - run: npx tsc --noEmit

  python:
    runs-on: ubuntu-latest
    needs: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm install && npm run build
        working-directory: unclarity-packages/core
      - run: pip install pytest mypy
      - run: mypy --strict src/unclarity
        working-directory: python
      - run: PYTHONPATH=src pytest -q
        working-directory: python
